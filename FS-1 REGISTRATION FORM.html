<!DOCTYPE html>
<html>
<head>
    <title>Simple Form</title>
    <style>
        body {
            background-color: pink;
            font-family: Arial;
        }

        .container{
            background-color: white;
            width: 100px;
            margin: auto;
            padding: 12px;
        }

        input, select {
            width: 100%;
            margin: 5px 0;
            padding: 5px;
        }

        button {
            width: 100%;
            padding: 5px;
            background-color: green;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<form>
    <h3>Registration Form</h3>

    Name:
    <input type="text">

    Email:
    <input type="email">

    Password:
    <input type="password">

    Gender:
    <select>
        <option>Male</option>
        <option>Female</option>
    </select>

    <br><br>
    <button type="submit">Submit</button>
</form>

</body>
</html>
