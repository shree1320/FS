<!DOCTYPE html>
<html>
<head>
  <title>Simple Validation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script>
    function validateForm() {
      let name = document.getElementById("name").value;
      let email = document.getElementById("email").value;
      let password = document.getElementById("password").value;
      if (name === "" || email === "") {
        alert("All fields are required!");
        return false;
      }
      if (password.length < 6) {
        alert("Passwor must be atleast 6 characters");
        return false;
      }
      if (!email.includes("@")) {
        alert("Enter a valid email!");
        return false;
      }
      alert("Form submitted successfully!");
      return true;
    }
  </script>
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="card p-4 shadow col-md-4 mx-auto">
      <h4 class="text-center text-primary mb-3">Register</h4>
      <form onsubmit="return validateForm()">
        <input type="text" id="name" class="form-control mb-3" placeholder="Name">
        <input type="text" id="email" class="form-control mb-3" placeholder="Email">
        <input type="paasword" id="password" class = "form-control mb-3" placeholder="Password">
        <button type="submit" class="btn btn-primary w-100">Submit</button>
      </form>
    </div>
  </div>
</body>
</html>
